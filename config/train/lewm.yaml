defaults:
  - _self_
  - launcher: local
  - data: pusht
  - model: lewm

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
embed_dim: 192
history_size: 3

trainer:
  max_epochs: 100
  num_nodes: 2      # 🚨 新增：告诉框架一共有 2 台物理机器
  devices: 4        # 🚨 修改：每台机器上只有 4 张卡
  accelerator: gpu
  precision: 16-mixed
  gradient_clip_val: 1.0
  strategy: ddp

loader:
  batch_size: 64
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

wandb:
  config:
    project: "lewm_reproduce"
    name: "tworoom_v1"
